# ============================================================
# 智能 BI 数据分析平台 · 配置示例（application-example.yml）
# 用法：复制本文件为 application.yml，按需填充下方 ${...} 占位符
# ⚠️ application.yml 已被 .gitignore 忽略，切勿提交真实密钥
# ============================================================

# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.7
  # 版权年份
  copyrightYear: 2023
  # 文件路径示例（Windows 配置 D:/ruoyi/uploadPath，Linux 配置 /home/ruoyi/uploadPath）
  profile: ${UPLOAD_PATH:/tmp/ruoyi}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: ${REDIS_HOST:localhost}
    # 端口，默认为6379
    port: ${REDIS_PORT:6379}
    # 数据库索引
    database: 0
    # 密码（可空）
    password: ${REDIS_PASSWORD:}
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥（⚠️ 原仓库为 abcdefghijklmnopqrstuvwxyz，务必改成随机长串）
  secret: ${TOKEN_SECRET:please-change-to-a-random-string}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: postgresql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# OCR（Java 调 Python 脚本）配置
ocr:
  # Python 可执行文件绝对路径（需安装 paddleocr + paddlepaddle）
  # 原 Windows 示例：D:/Program Files/anaconda3/python.exe
  python-path: ${OCR_PYTHON_PATH:python}
  # OCR Python 脚本绝对路径
  # 原示例：D:/工程组/RuoYi-Vue-v3.8.7/ruoyi-admin/ocr_paddle.py
  script-path: ${OCR_SCRIPT_PATH:ocr_paddle.py}
  # 识别超时时间（毫秒，默认 120000 = 120秒，PaddleOCR 首次加载模型较慢）
  timeout-ms: 120000

# AI大模型配置（火山方舟Ark API）
ai:
  ark:
    # Ark API base URL
    base-url: https://ark.cn-beijing.volces.com/api/v3
    # Ark API Key（从环境变量 ARK_API_KEY 读取，留空则 AI 功能禁用）
    api-key: ${ARK_API_KEY:}
    # 对话模型（DeepSeek V4 Flash，用于NL2SQL和数据解读）
    model: deepseek-v4-flash-260425
    # 调用超时（毫秒）
    timeout-ms: 30000

# 向量数据库配置（PostgreSQL + pgvector）
pgvector:
  # PostgreSQL连接配置
  jdbc-url: jdbc:postgresql://${PGVECTOR_HOST:localhost}:${PGVECTOR_PORT:5432}/${PGVECTOR_DB:ruoyi_bi}
  username: ${PGVECTOR_USER:postgres}
  # ⚠️ 请改成你的真实密码（推荐用环境变量注入，避免明文入库）
  password: ${PGVECTOR_PASSWORD:postgres}
  # 向量维度（BGE-M3：1024维）
  vector-dimension: 1024
  # 向量索引类型（ivfflat、hnsw）
  index-type: ivfflat
  # 向量检索距离算法（cosine、l2、ip）
  distance-algorithm: cosine
